name: SDK Generation

# Generator: OpenAPI Generator (ruby) via scripts/generate.sh.
#
# Keeps the same workflow filename and dispatch inputs as the other SDK repos
# (convoy.js, convoy-python, convoy-java, convoy-go) so the frain-dev/convoy
# dispatcher (speakeasy-sdk.yml) works unchanged.

on:
  workflow_dispatch:
    inputs:
      force:
        # Accepted for dispatcher compatibility. Generation is deterministic
        # from the spec, so there is nothing to force: no diff means no PR.
        description: Accepted for compatibility; regeneration is always run
        required: false
        default: "false"
        type: string
      feature_branch:
        description: Branch for SDK changes
        required: false
        type: string
  schedule:
    - cron: "0 6 * * 1"

# Serialize generations: overlapping cron/dispatch runs race on the same
# branch/PR. Queue instead of cancel so a triggered regen is never dropped.
concurrency:
  group: sdk-generation
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Mint bot app token
        id: bot-token
        # Pin to commit SHA for v1 (mutable tags can be retargeted).
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.SDK_BOT_APP_ID }}
          private-key: ${{ secrets.SDK_BOT_APP_KEY }}

      - name: Checkout Code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          # Regen branches are always derived from main: the spec is pulled
          # from convoy main, so a dispatch from another ref must not silently
          # commit generated output onto that ref's base.
          ref: main
          # App token, not GITHUB_TOKEN: PRs opened with GITHUB_TOKEN do not
          # trigger pull_request workflows, so verify CI would never run on
          # them. The convoy-sdk-bot app token triggers CI like a PAT.
          token: ${{ steps.bot-token.outputs.token }}

      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Ruby
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Regenerate client
        run: ./scripts/generate.sh

      - name: Test regenerated client
        # Never open a PR for a client that breaks the tests (verify +
        # contract). PR CI (ci.yml) re-proves this on the PR itself.
        run: bundle exec rake test

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet && [ -z "$(git status --porcelain)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No client changes; skipping PR." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare feature branch
        if: steps.diff.outputs.changed == 'true'
        id: branch
        env:
          # Never interpolate free-form dispatch inputs into run: directly.
          FEATURE_BRANCH_INPUT: ${{ inputs.feature_branch }}
        run: |
          if [ -n "$FEATURE_BRANCH_INPUT" ]; then
            # SDK PRs must come from a reviewable feature branch, never a
            # protected ref or an option-looking / metacharacter name.
            # refs/* is blocked too: "refs/heads/main" would bypass the
            # literal main check and force-push the default branch.
            case "$FEATURE_BRANCH_INPUT" in
              main|master|release/*|refs/*|-*|*[!a-zA-Z0-9._/-]*)
                echo "::error::Invalid feature_branch '$FEATURE_BRANCH_INPUT'"
                exit 1
                ;;
            esac
            echo "name=$FEATURE_BRANCH_INPUT" >> "$GITHUB_OUTPUT"
          else
            echo "name=sdk-regen-$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: Push branch and open PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
          BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          git config user.name "convoy-sdk-bot[bot]"
          git config user.email "307218117+convoy-sdk-bot[bot]@users.noreply.github.com"

          git checkout -B "$BRANCH"
          git add -A
          git commit -m "feat: regenerate API client from OpenAPI spec"
          # Force push is safe: the regen branch is fully derived from main
          # plus this deterministic generation; any previous content is stale.
          git push --force origin "$BRANCH"

          existing=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -z "$existing" ]; then
            gh pr create \
              --head "$BRANCH" \
              --title "feat: regenerate API client from OpenAPI spec" \
              --body "Automated regeneration via OpenAPI Generator (ruby) from \`docs/v3/openapi3.yaml\` on frain-dev/convoy main. Hand-written gem code (\`lib/convoy/\`, incl. webhook verify) is untouched by the sync script."
            echo "Opened PR for $BRANCH" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Updated existing PR #$existing" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Mint reviewer app token
        if: steps.diff.outputs.changed == 'true'
        id: app-token
        # Pin to commit SHA for v1 (mutable tags can be retargeted).
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.SDK_REVIEWER_APP_ID }}
          private-key: ${{ secrets.SDK_REVIEWER_APP_KEY }}

      - name: Approve and enable auto-merge
        if: steps.diff.outputs.changed == 'true'
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          # Merge via the bot app token, not GITHUB_TOKEN: merges performed
          # by GITHUB_TOKEN do not trigger the downstream publish workflows.
          MERGE_TOKEN: ${{ steps.bot-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          # Failure policy: fail open to human review, never to merge. If the
          # diff touches anything outside the generated paths the PR is left
          # unapproved with the offending paths printed. Auto-merge completes
          # only after the required status checks pass.
          pr=$(GH_TOKEN="$APP_TOKEN" gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -z "$pr" ]; then
            echo "No open PR for $BRANCH; nothing to approve."
            exit 0
          fi

          # Only regen PRs authored by the bot app qualify for auto-review.
          # REST is used because it returns the stable "convoy-sdk-bot[bot]"
          # login for app-authored PRs.
          author=$(GH_TOKEN="$APP_TOKEN" gh api "repos/$GH_REPO/pulls/$pr" --jq '.user.login')
          if [ "$author" != "convoy-sdk-bot[bot]" ]; then
            echo "Not approving PR #$pr: author is $author, not convoy-sdk-bot[bot]."
            GH_TOKEN="$APP_TOKEN" gh pr comment "$pr" --body "SDK reviewer app: not auto-approving; PR author is not convoy-sdk-bot[bot]. Left for human review (policy: fail open to human review, never to merge)."
            exit 0
          fi

          # The head branch is the regen branch this run pushed, so the
          # branch condition holds by construction of the lookup above.
          # Allowlist mirrors scripts/generate.sh: only lib/convoy_api/ and
          # lib/convoy_api.rb are generated; lib/convoy/ is hand-written.
          bad=$(GH_TOKEN="$APP_TOKEN" gh api "repos/$GH_REPO/pulls/$pr/files" --paginate --jq '.[].filename' \
            | while read -r f; do
                case "$f" in
                  lib/convoy_api/*|lib/convoy_api.rb) ;;
                  *) echo "$f" ;;
                esac
              done)
          if [ -n "$bad" ]; then
            echo "Not approving PR #$pr: diff touches non-generated paths:"
            echo "$bad"
            {
              echo "SDK reviewer app: not auto-approving; the diff touches paths outside the generated allowlist:"
              echo
              echo '```'
              echo "$bad"
              echo '```'
              echo
              echo "Left for human review (policy: fail open to human review, never to merge)."
            } | GH_TOKEN="$APP_TOKEN" gh pr comment "$pr" --body-file -
            exit 0
          fi

          GH_TOKEN="$APP_TOKEN" gh api -X POST "repos/$GH_REPO/pulls/$pr/reviews" \
            -f event=APPROVE \
            -f body="SDK reviewer app: approving a generated-paths-only diff on the regen branch. Auto-merge completes only after required status checks pass."

          enabled=$(GH_TOKEN="$APP_TOKEN" gh pr view "$pr" --json autoMergeRequest --jq '.autoMergeRequest != null')
          if [ "$enabled" = "true" ]; then
            echo "Auto-merge already enabled on PR #$pr."
          else
            GH_TOKEN="$MERGE_TOKEN" gh pr merge "$pr" --auto --squash
          fi
